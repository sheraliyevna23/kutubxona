<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mening Kutubxonam</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Fon dekoratsiyalari (yulduzlar / zarrachalar) -->
<div id="bgDecor" aria-hidden="true"></div>

<header class="site-header">

  <!-- Yon tomonlardagi kitob javonlari -->
  <div class="header-wings" aria-hidden="true">
    <div class="wing wing-l">
      <span style="--h:58px;--c:#6B2818;--w:13px"></span>
      <span style="--h:74px;--c:#1C5C38;--w:16px"></span>
      <span style="--h:44px;--c:#8C4818;--w:11px"></span>
      <span style="--h:68px;--c:#1E3A60;--w:15px"></span>
      <span style="--h:82px;--c:#5A1F2C;--w:14px"></span>
      <span style="--h:52px;--c:#2C4818;--w:12px"></span>
      <span style="--h:70px;--c:#3A1C5C;--w:16px"></span>
      <span style="--h:46px;--c:#7A3018;--w:11px"></span>
      <span style="--h:76px;--c:#0E4A44;--w:14px"></span>
      <span style="--h:60px;--c:#502810;--w:13px"></span>
      <span style="--h:64px;--c:#184028;--w:15px"></span>
      <span style="--h:50px;--c:#401020;--w:12px"></span>
      <span style="--h:78px;--c:#1C3A5C;--w:14px"></span>
      <span style="--h:42px;--c:#6A2010;--w:11px"></span>
    </div>
    <div class="wing wing-r">
      <span style="--h:42px;--c:#6A2010;--w:11px"></span>
      <span style="--h:78px;--c:#1C3A5C;--w:14px"></span>
      <span style="--h:50px;--c:#401020;--w:12px"></span>
      <span style="--h:64px;--c:#184028;--w:15px"></span>
      <span style="--h:60px;--c:#502810;--w:13px"></span>
      <span style="--h:76px;--c:#0E4A44;--w:14px"></span>
      <span style="--h:46px;--c:#7A3018;--w:11px"></span>
      <span style="--h:70px;--c:#3A1C5C;--w:16px"></span>
      <span style="--h:52px;--c:#2C4818;--w:12px"></span>
      <span style="--h:82px;--c:#5A1F2C;--w:14px"></span>
      <span style="--h:68px;--c:#1E3A60;--w:15px"></span>
      <span style="--h:44px;--c:#8C4818;--w:11px"></span>
      <span style="--h:74px;--c:#1C5C38;--w:16px"></span>
      <span style="--h:58px;--c:#6B2818;--w:13px"></span>
    </div>
  </div>

  <div class="header-inner">

    <div class="header-brand">
      <div class="brand-icon">
        <svg width="50" height="43" viewBox="0 0 64 54" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Soya -->
          <path d="M33 52C33 52 9 49 9 15V13C9 11.3 10.3 10 12 10H33V52Z" fill="#060402" opacity=".45"/>
          <path d="M33 52C33 52 57 49 57 15V13C57 11.3 55.7 10 54 10H33V52Z" fill="#040301" opacity=".45"/>
          <!-- Chap muqova -->
          <path d="M33 50C33 50 11 47 11 15V13C11 11.3 12.3 10 14 10H33V50Z" fill="#2A1C0C" stroke="rgba(210,168,52,.62)" stroke-width="1.2" stroke-linejoin="round"/>
          <!-- O'ng muqova -->
          <path d="M33 50C33 50 55 47 55 15V13C55 11.3 53.7 10 52 10H33V50Z" fill="#1C1208" stroke="rgba(210,168,52,.62)" stroke-width="1.2" stroke-linejoin="round"/>
          <!-- Chap sahifa chiziqlari -->
          <line x1="15" y1="18" x2="30" y2="17.1" stroke="#D8B040" stroke-width="1.5" stroke-linecap="round" opacity=".82"/>
          <line x1="15" y1="23" x2="30" y2="22.2" stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".52"/>
          <line x1="15" y1="28" x2="26" y2="27.3" stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".38"/>
          <line x1="15" y1="33" x2="30" y2="32.3" stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".27"/>
          <line x1="15" y1="38" x2="24" y2="37.5" stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".18"/>
          <line x1="15" y1="43" x2="30" y2="42.5" stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".11"/>
          <!-- O'ng sahifa chiziqlari -->
          <line x1="36" y1="17.1" x2="51" y2="18"  stroke="#D8B040" stroke-width="1.5" stroke-linecap="round" opacity=".82"/>
          <line x1="36" y1="22.2" x2="51" y2="23"  stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".52"/>
          <line x1="36" y1="27.3" x2="49" y2="28"  stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".38"/>
          <line x1="36" y1="32.3" x2="51" y2="33"  stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".27"/>
          <line x1="36" y1="37.5" x2="47" y2="38"  stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".18"/>
          <line x1="36" y1="42.5" x2="51" y2="43"  stroke="#D8B040" stroke-width="1.1" stroke-linecap="round" opacity=".11"/>
          <!-- Umurtqa (gradient effekti uchun ikki qatlam) -->
          <line x1="33" y1="10" x2="33" y2="50" stroke="#C0940C" stroke-width="3"   stroke-linecap="round" opacity=".4"/>
          <line x1="33" y1="10" x2="33" y2="50" stroke="#F0D860" stroke-width="1.8" stroke-linecap="round"/>
          <!-- Pastki yoy -->
          <path d="M12 46Q33 52 54 46" stroke="rgba(210,168,52,.22)" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <!-- Xatchacha (bookmark) -->
          <path d="M48 10L48 24L45 21L42 24L42 10Z" fill="#9E2E18" opacity=".95"/>
          <line x1="45" y1="24" x2="45" y2="29" stroke="#7A2010" stroke-width="1.5" stroke-linecap="round" opacity=".65"/>
          <!-- Bezak yulduzi (muqovada) -->
          <path d="M21 43.5L21.7 41.4L22.4 43.5L24.5 44.2L22.4 44.9L21.7 47L21 44.9L18.9 44.2Z" fill="rgba(210,168,52,.28)"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Mening Kutubxonam</h1>
        <p class="brand-sub" id="brandSub">Shaxsiy kitoblar to'plami</p>
      </div>
    </div>

    <!-- Markaziy bezak chizig'i -->
    <div class="header-center" aria-hidden="true">
      <div class="hdr-orn">
        <span class="orn-line"></span>
        <svg class="orn-gem" width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6Z"/></svg>
        <span class="orn-dot"></span>
        <span class="orn-dot"></span>
        <span class="orn-dot"></span>
        <svg class="orn-gem" width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6Z"/></svg>
        <span class="orn-line"></span>
      </div>
    </div>

    <div class="header-right">
      <div class="header-controls">

        <!-- Tun/Kun toggle -->
        <div class="theme-toggle">
          <svg class="t-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <button class="t-switch" id="themeToggle" aria-label="Tema almashtirish"><span class="t-knob"></span></button>
          <svg class="t-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </div>

        <!-- Foydalanuvchi -->
        <div class="user-badge">
          <div class="user-avatar" id="userAvatar"></div>
          <div class="user-info">
            <span class="user-name" id="userDisplayName"></span>
            <span class="user-username" id="userUsername"></span>
          </div>
          <button class="logout-btn" id="logoutBtn" title="Chiqish">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Chiqish
          </button>
        </div>

      </div><!-- /header-controls -->

      <div class="stats" id="stats">
        <div class="stat">
          <div class="num" id="statAll">0</div>
          <div class="lbl">Jami</div>
        </div>
        <div class="stat bor">
          <div class="num" id="statBor">0</div>
          <div class="lbl">Mavjud</div>
        </div>
        <div class="stat yoq">
          <div class="num" id="statYoq">0</div>
          <div class="lbl">Kerak</div>
        </div>
      </div>
    </div><!-- /header-right -->

  </div><!-- /header-inner -->

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="progress-label" id="progressLabel"></span>
  </div>
</header>

<div class="wrap">

  <form class="addcard" id="addForm">
    <div class="addcard-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Yangi kitob qo'shish
    </div>
    <div class="row">
      <input type="text" name="title"  placeholder="Kitob nomi..." required autocomplete="off">
      <input type="text" name="author" placeholder="Muallif (ixtiyoriy)" autocomplete="off">
      <select name="status">
        <option value="bor">✓  Mavjud</option>
        <option value="yoq">✗  Kerak</option>
      </select>
      <button type="submit">Qo'shish</button>
    </div>
  </form>

  <div class="toolbar">
    <div class="tabs" id="tabs">
      <button data-f="all" class="active">Barchasi</button>
      <button data-f="bor">Mavjud</button>
      <button data-f="yoq">Kerak</button>
    </div>
    <label class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search" id="searchBox" type="text" placeholder="Qidirish...">
    </label>
  </div>

  <div class="list" id="list"></div>
  <div class="status-msg" id="statusMsg"></div>

</div>

<!-- Toast xabarlari -->
<div id="toastWrap" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
